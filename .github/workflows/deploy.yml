name: Deploy to App Store

on:
  push:
    branches:
      - main
    paths:
      - 'NourishMindHeart_RN/**'

jobs:
  deploy:
    name: Build & Submit to App Store
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: NourishMindHeart_RN

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: NourishMindHeart_RN/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Build and submit to App Store
        run: |
          eas build \
            --platform ios \
            --profile production \
            --auto-submit \
            --non-interactive
        env:
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
          EXPO_ASC_APP_ID: ${{ secrets.EXPO_ASC_APP_ID }}

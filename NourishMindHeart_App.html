<!DOCTYPE html>

<title>Nourish Mind & Heart — 30-Day Vegetarian Meal Plan</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {

    --gold: #C4920F; --rust: #A63A1A; --navy: #1B2A4A;

  }
  html, body { height: 100%; background: #f0f0f0; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif; }
  
  /* ── PHONE SHELL ── */

  .phone { width: 390px; background: #fafafa; border-radius: 40px; overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.08); display: flex; flex-direction: column; position: relative; }
  .notch { background: #111; height: 30px; display: flex; align-items: center; justify-content: center; }
  .notch-pill { width: 100px; height: 14px; background: #000; border-radius: 10px; }
  .screen { flex: 1; overflow-y: auto; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
  .screen::-webkit-scrollbar { display: none; }
  .tab-bar { background: rgba(255,255,255,0.96); backdrop-filter: blur(10px); border-top: 0.5px solid var(--border); display: flex; padding: 10px 0 16px; position: sticky; bottom: 0; z-index: 100; }
  .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; border: none; background: none; cursor: pointer; padding: 0; }
  .tab-icon { font-size: 20px; line-height: 1; transition: transform 0.2s; }
  .tab-btn.active .tab-icon { transform: scale(1.15); }
  .tab-label { font-size: 10px; font-weight: 500; color: #aaa; transition: color 0.2s; }
  .tab-btn.active .tab-label { color: var(--emerald); font-weight: 700; }

  /* ── HEADER VARIANTS ── */
  .hdr { padding: 20px 16px 18px; color: #fff; }
  .hdr-title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
  .hdr-sub { font-size: 13px; opacity: 0.85; line-height: 1.5; }
  .hdr-green { background: linear-gradient(135deg, var(--emerald) 0%, var(--teal) 100%); }
  .hdr-navy { background: var(--navy); }
  .hdr-rust { background: var(--rust); }
  .hdr-teal { background: var(--teal); }
  .hdr-gold { background: #8B6914; }

  /* ── SUB-TABS ── */
  .sub-tabs { display: flex; gap: 6px; padding: 4px; background: rgba(0,0,0,0.18); border-radius: 10px; }
  .sub-tab { flex: 1; padding: 7px 0; border-radius: 7px; border: none; cursor: pointer; font-size: 11px; font-weight: 700; background: transparent; color: rgba(255,255,255,0.75); transition: all 0.2s; }
  .sub-tab.active { background: #fff; color: var(--navy); }
  .content { padding: 16px; }

  /* ── CARDS ── */
  .card { background: #fff; border-radius: var(--radius); border: 0.5px solid var(--border); padding: 14px; margin-bottom: 10px; cursor: pointer; box-shadow: var(--card-shadow); transition: transform 0.15s, box-shadow 0.15s; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
  .card-row { display: flex; align-items: flex-start; gap: 12px; }
  .big-emoji { font-size: 38px; line-height: 1; flex-shrink: 0; }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 5px; line-height: 1.3; }
  .card-meta { display: flex; gap: 10px; font-size: 12px; color: var(--text-3); margin-bottom: 6px; flex-wrap: wrap; }
  .card-cost { color: var(--emerald); font-weight: 700; }
  .card-nutrients { display: flex; gap: 8px; font-size: 12px; color: var(--text-2); margin-bottom: 8px; }
  .chevron { font-size: 16px; color: #ccc; flex-shrink: 0; align-self: center; }

  /* ── TAGS ── */
  .tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag { display: inline-block; border-radius: var(--radius-pill); padding: 3px 9px; font-size: 10px; font-weight: 600; }

  /* ── METRIC CARDS ── */
  .metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 18px; }
  .metric-card { background: var(--light-bg); border-radius: 12px; padding: 10px 4px; text-align: center; }
  .metric-val { font-size: 15px; font-weight: 800; color: var(--emerald); }
  .metric-lbl { font-size: 10px; color: var(--text-3); margin-top: 2px; }

  /* ── TODAY MEALS ── */
  .today-card { background: #fff; border-radius: var(--radius); border: 0.5px solid var(--border); padding: 14px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; box-shadow: var(--card-shadow); transition: transform 0.15s; }
  .today-card:hover { transform: translateX(3px); }
  .today-emoji { font-size: 34px; }
  .today-info { flex: 1; }
  .today-type { font-size: 11px; color: var(--teal); font-weight: 700; margin-bottom: 3px; letter-spacing: 0.3px; }
  .today-name { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.3; margin-bottom: 3px; }
  .today-meta { font-size: 12px; color: var(--text-3); }

  /* ── HERO STATS ── */
  .hero-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 18px; }
  .hero-stat { background: var(--light-bg); border-radius: 12px; padding: 12px 8px; text-align: center; }
  .hero-stat-icon { font-size: 20px; margin-bottom: 4px; }
  .hero-stat-label { font-size: 11px; font-weight: 700; color: var(--emerald); }
  .hero-stat-sub { font-size: 10px; color: var(--text-3); }

  /* ── NUTRITION BAR ── */
  .nutr-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .nutr-card { background: #fff; border-radius: 12px; border: 0.5px solid var(--border); padding: 12px 14px; }
  .nutr-val { font-size: 20px; font-weight: 800; color: var(--emerald); }
  .nutr-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .nutr-sub { font-size: 11px; color: var(--text-3); }

  /* ── WEEK PLAN ── */
  .week-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .week-tab { flex: 1; padding: 8px 0; border-radius: 8px; border: none; cursor: pointer; font-size: 11px; font-weight: 700; background: #eee; color: #666; transition: all 0.2s; }
  .week-tab.active { background: var(--emerald); color: #fff; }
  .day-row { margin-bottom: 16px; }
  .day-label { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .day-chip { width: 38px; height: 38px; border-radius: 19px; background: var(--light-bg); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: var(--emerald); flex-shrink: 0; }
  .day-name { font-size: 15px; font-weight: 700; color: var(--navy); }
  .day-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .meal-cell { border-radius: 12px; padding: 10px 8px; cursor: pointer; border: 0.5px solid var(--border); transition: transform 0.12s; }
  .meal-cell:hover { transform: scale(1.03); }
  .cell-emoji { font-size: 24px; margin-bottom: 5px; }
  .cell-type { font-size: 9px; color: var(--teal); font-weight: 700; margin-bottom: 3px; letter-spacing: 0.5px; text-transform: uppercase; }
  .cell-name { font-size: 10px; font-weight: 700; color: var(--text); line-height: 1.35; }
  .cell-cost { font-size: 10px; color: var(--text-3); margin-top: 4px; }

  /* ── FILTER BAR ── */
  .filter-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-pill { flex-shrink: 0; padding: 7px 14px; border-radius: var(--radius-pill); border: 1px solid var(--border); background: #fff; color: var(--text-2); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .filter-pill.active { background: var(--emerald); color: #fff; border-color: var(--emerald); }
  .search-wrap { position: relative; margin-bottom: 12px; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; }
  .search-input { width: 100%; padding: 11px 12px 11px 34px; border-radius: 12px; border: 1px solid var(--border); font-size: 14px; background: #fff; color: var(--text); outline: none; }
  .search-input:focus { border-color: var(--sage); }
  .results-count { font-size: 12px; color: var(--text-3); margin-bottom: 12px; }

  /* ── RECIPE DETAIL ── */
  .detail-header { position: sticky; top: 0; background: rgba(255,255,255,0.96); backdrop-filter: blur(10px); z-index: 50; padding: 12px 16px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .back-btn { background: none; border: none; cursor: pointer; color: var(--emerald); font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 4px; padding: 0; }
  .detail-hero { text-align: center; padding: 20px 16px 0; }
  .detail-emoji { font-size: 64px; margin-bottom: 12px; }
  .detail-name { font-size: 20px; font-weight: 800; color: var(--text); line-height: 1.3; margin-bottom: 10px; padding: 0 10px; }
  .detail-meta { display: flex; justify-content: center; gap: 16px; font-size: 12px; color: var(--text-3); margin-bottom: 12px; flex-wrap: wrap; }
  .diff-dot { font-weight: 700; }
  .diff-easy { color: var(--teal); }
  .diff-medium { color: var(--gold); }
  .diff-hard { color: var(--rust); }
  .detail-tabs { display: flex; border-bottom: 0.5px solid var(--border); }
  .detail-tab { flex: 1; padding: 12px 0; font-size: 13px; font-weight: 600; background: none; border: none; cursor: pointer; color: #aaa; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .detail-tab.active { color: var(--emerald); border-bottom: 2px solid var(--emerald); }

  /* ── RECIPE CONTENT ── */
  .section-title { font-size: 16px; font-weight: 800; color: var(--navy); margin-bottom: 12px; margin-top: 18px; }

  .step-num { width: 30px; height: 30px; border-radius: 15px; background: var(--emerald); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; flex-shrink: 0; }
  .step-text { font-size: 14px; color: var(--text-2); line-height: 1.6; padding-top: 5px; }

  .check { color: var(--emerald); font-size: 16px; }
  .science-box { background: var(--light-blue); border-radius: var(--radius); padding: 14px; margin: 12px 0; border-left: 3px solid var(--navy); }
  .science-label { font-size: 11px; font-weight: 800; color: var(--navy); margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
  .science-text { font-size: 13px; color: #2c3e70; line-height: 1.7; }
  .shop-box { background: var(--light-gold); border-radius: var(--radius); padding: 14px; margin: 12px 0; }
  .shop-label { font-size: 11px; font-weight: 800; color: #8B6914; margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase; }
  .shop-text { font-size: 13px; color: #5a4010; line-height: 1.7; }
  .tip-box { background: #fff; border-radius: var(--radius); border: 0.5px solid var(--border); padding: 14px; margin-top: 12px; }
  .tip-label { font-size: 11px; font-weight: 800; color: var(--navy); margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase; }
  .tip-text { font-size: 12px; color: var(--text-2); line-height: 1.8; }

  .savings-sub { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .tip-item { background: #fff; border-radius: 12px; border: 0.5px solid var(--border); padding: 14px; margin-bottom: 10px; display: flex; gap: 12px; align-items: flex-start; }
  .tip-num { width: 30px; height: 30px; border-radius: 15px; background: var(--emerald); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; flex-shrink: 0; }

  .tip-detail { font-size: 12px; color: var(--text-2); line-height: 1.6; }
  .alert-box { background: #E8F4F8; border-radius: var(--radius); padding: 14px; margin-bottom: 14px; border-left: 3px solid var(--teal); }
  .alert-title { font-size: 12px; font-weight: 800; color: var(--navy); margin-bottom: 6px; }
  .alert-text { font-size: 12px; color: #1B4A5A; line-height: 1.7; }

     steps:['Toast sourdough until golden and crispy. Mash avocados with lemon juice, salt, and pepper.','Bring a medium saucepan of water to a gentle simmer (not boiling). Add white vinegar.','Create a gentle whirlpool with a spoon. Crack each egg into the center. Cook 3 minutes for runny yolk.','Spread avocado generously on toast. Top with poached egg. Sprinkle hemp seeds and red pepper flakes.'],
     sci:'Each egg provides 125mg choline — the precursor to acetylcholine, the primary memory neurotransmitter. Adequate dietary choline is associated with 25% better cognitive performance (Nurk et al., American Journal of Clinical Nutrition, 2010). Hemp seeds contain all essential amino acids at a 3:1 omega-6:omega-3 ratio. Sourdough fermentation reduces phytic acid by 50%, improving mineral bioavailability.',
     ben:['125mg choline per egg for acetylcholine synthesis','Brain myelin production from avocado monounsaturated fats','Complete amino acids from hemp seeds','Sourdough fermentation doubles mineral bioavailability'],
     shop:'Avocados: Costco 6-pack (~$6, ripens at room temp — refrigerate when ripe) | Sourdough: Dave\'s Killer Bread ($5–6) or local artisan bakery | Hemp seeds: Manitoba Harvest (Whole Foods, ~$8/bag) | Eggs: Vital Farms or Costco pasture-raised ($6–8/dozen)'},
    {id:'b3',e:'🍇',n:'Acai Bowl with Granola & Cacao Nibs',t:'10 min',s:2,cost:'$4.50',cal:460,pro:'10g',fib:'9g',dif:'Easy',col:'#F0ECFF',
     tags:['antioxidants','brain','flavonoids'],
     ing:['2 packs (200g) frozen acai puree','1 ripe banana','½ cup frozen mixed berries','¼ cup unsweetened almond milk','½ cup low-sugar granola','2 tbsp toasted coconut flakes','1 tbsp raw honey','Fresh kiwi slices','1 tbsp cacao nibs'],
     steps:['Place frozen acai, banana, berries, and almond milk in a high-speed blender.','Blend until very thick and smooth — the consistency should be like soft-serve, not liquid.','Pour into two bowls immediately.','Top with granola, coconut, kiwi slices, cacao nibs, and a drizzle of honey. Serve cold.'],
     sci:'Acai berries have an ORAC (Oxygen Radical Absorbance Capacity) score of ~15,000 per 100g — one of the highest of any food tested. Cacao flavanoids increase nitric oxide production, improving cerebral blood flow. A 2020 Nutrients study found regular cacao consumption improved processing speed and working memory. Kiwi provides 92mg vitamin C (102% DV) per fruit, supporting collagen and neurotransmitter synthesis.',
     ben:['Acai: highest ORAC antioxidant score of any food','Cacao flavanoids improve cerebral blood flow','Kiwi: 92mg vitamin C per fruit (102% DV)','Granola provides complex carbohydrates for sustained energy'],
     shop:'Acai packets: Sambazon brand (Whole Foods, Publix ~$6/pack) | Granola: KIND Healthy Grains or Purely Elizabeth (Target ~$5) | Cacao nibs: Navitas Organics (Amazon or Whole Foods ~$7) | Coconut flakes: Bob\'s Red Mill (Publix ~$4)'},
    {id:'b4',e:'🍓',n:'Greek Yogurt Parfait with Walnuts & Berries',t:'5 min',s:2,cost:'$2.80',cal:390,pro:'24g',fib:'7g',dif:'Easy',col:'#FDE8E8',
     tags:['probiotics','protein','gut-brain axis'],
     ing:['2 cups full-fat Greek yogurt','1 cup strawberries (sliced)','½ cup blueberries','¼ cup walnuts','3 tbsp granola','1 tbsp ground flaxseed','1 tsp honey per serving','½ tsp vanilla extract'],
     steps:['Stir vanilla extract into Greek yogurt until well combined.','Layer yogurt, fresh strawberries, and blueberries in two tall glasses or bowls.','Add granola layer. Repeat yogurt and berry layers.','Top with walnuts, ground flaxseed, and a drizzle of honey. Serve immediately.'],
     sci:'Greek yogurt contains live Lactobacillus acidophilus and Bifidobacterium cultures that support the gut-brain axis — the gut produces approximately 95% of the body\'s serotonin. A 2019 meta-analysis in Frontiers in Psychiatry (n=34 studies) found probiotic supplementation significantly reduced depression and anxiety symptoms. Ground flaxseed is the richest plant source of ALA omega-3 at 2.35g per tablespoon.',
     ben:['10+ billion live probiotic cultures per serving','Gut produces 95% of serotonin — probiotics optimize production','24g complete protein — highest plant breakfast protein','Flaxseed: 2.35g ALA omega-3 per tablespoon'],
     shop:'Greek yogurt: Fage Total 5% or Chobani Full Fat (all stores $5–6/large) | Ground flaxseed: Bob\'s Red Mill (Publix, Walmart ~$4) | Berries: Costco frozen ($10/3lb) | Walnuts: Fisher or Kirkland ($5–12/bag)'},
    {id:'b5',e:'🥭',n:'Chia Seed Pudding with Mango & Coconut',t:'5 min + 4hr chill',s:2,cost:'$2.60',cal:440,pro:'9g',fib:'14g',dif:'Easy',col:'#E8F5E9',
     tags:['MCT','omega-3','fiber','sustained energy'],
     ing:['6 tbsp black chia seeds','2 cups full-fat coconut milk (canned)','1 tbsp pure maple syrup','1 tsp vanilla extract','1 ripe mango (diced)','2 tbsp toasted coconut flakes','½ lime (zest and juice)','1 passion fruit (optional)'],
     steps:['Whisk chia seeds, coconut milk, maple syrup, and vanilla in a large bowl.','Let mixture sit 15 minutes, then whisk again thoroughly to break up any clumps.','Cover and refrigerate at least 4 hours, or ideally overnight, until thick and creamy.','Toss diced mango with lime zest and juice. Serve pudding topped with mango and coconut flakes.'],
     sci:'Chia seeds absorb 10× their weight in liquid, creating a gel matrix that slows gastric emptying and stabilizes blood glucose for 4–6 hours. Full-fat coconut milk provides medium-chain triglycerides (MCTs) that bypass normal fat digestion and are converted to ketone bodies within 30 minutes — providing fast, alternative brain fuel (Page et al., Neurobiology of Aging, 2009). Mango provides folate for neurotransmitter synthesis.',
     ben:['MCTs converted to brain-fueling ketones within 30 minutes','Chia gel matrix stabilizes blood glucose for 4–6 hours','14g fiber per serving feeds 500+ bacterial species','Mango folate for dopamine & serotonin synthesis'],
     shop:'Chia seeds: Nutiva Organic (Costco ~$12/2lb — best value) | Coconut milk: Thai Kitchen full-fat (Publix, Walmart ~$2.50/can) | Mango: Costco frozen mango chunks ($10/4lb) | Passion fruit: Fresh at Latin grocery stores'},
    {id:'b6',e:'🫑',n:'Tofu Scramble with Spinach & Bell Peppers',t:'20 min',s:2,cost:'$2.90',cal:380,pro:'26g',fib:'6g',dif:'Medium',col:'#E0F5EE',
     tags:['B12','lutein','complete protein'],
     ing:['400g extra-firm tofu (pressed 10 min)','2 tbsp extra virgin olive oil','1 large red bell pepper (diced)','2 cups fresh baby spinach','¼ tsp ground turmeric','2 tbsp nutritional yeast','1 tsp garlic powder','½ tsp cumin','Salt & pepper to taste'],
     steps:['Press tofu for 10 minutes using paper towels and a heavy pan. Crumble into pea-sized irregular pieces.','Heat olive oil in a large non-stick skillet over medium-high heat. Sauté bell pepper 3 minutes until softened.','Add crumbled tofu, turmeric, garlic powder, cumin, salt, and pepper. Cook 5–6 minutes, stirring occasionally.','Add spinach and nutritional yeast. Cook 2 more minutes until spinach wilts. Serve hot with whole grain toast.'],
     sci:'Nutritional yeast (B12-fortified) provides 2–4mcg B12 per 2 tbsp — critical for myelin sheath integrity and red blood cell formation. B12 deficiency causes irreversible neurological damage and is the most common deficiency in vegetarians (40–90% prevalence without supplementation). Spinach lutein correlates directly with preserved cognitive function across multiple brain regions (Barnett et al., Nutritional Neuroscience, 2018).',
     ben:['B12 from fortified nutritional yeast prevents neurological damage','Spinach lutein preserves cognitive function in frontal cortex','26g complete plant protein — exceeds egg breakfast','Turmeric curcumin + olive oil polyphenols synergize'],
     shop:'Tofu: Nasoya Extra Firm or House Foods (Publix, Target ~$3) | Nutritional yeast: Bragg\'s Premium (Whole Foods, Amazon ~$7 — always buy B12-fortified) | Spinach: Costco pre-washed baby spinach ($5/1.5lb bag) | Bell peppers: Costco multicolor pack ($7)'},

  l:[
    {id:'l0',e:'🫙',n:'Mediterranean Quinoa Power Bowl',t:'25 min',s:2,cost:'$4.20',cal:580,pro:'28g',fib:'14g',dif:'Medium',col:'#EAF4EE',
     tags:['complete protein','Mediterranean diet','heart health'],
     ing:['1 cup quinoa (well rinsed)','2 cups water','1 can chickpeas (drained, rinsed)','1 English cucumber (diced)','1 cup cherry tomatoes (halved)','½ red onion (finely diced)','½ cup Kalamata olives','100g Greek feta cheese (crumbled)','3 tbsp extra virgin olive oil','1 lemon (juice)','1 tsp dried oregano','Fresh flat-leaf parsley'],
     steps:['Bring 2 cups water to boil. Add rinsed quinoa, reduce heat, cover and simmer 15 minutes.','Fluff with fork. Let cool 10 minutes.','Toss chickpeas with 1 tbsp olive oil, paprika, and salt. Roast at 400°F for 20 minutes until crispy.','Combine quinoa with cucumber, tomatoes, onion, olives. Dress with olive oil, lemon, oregano. Season.','Top with crumbled feta, crispy chickpeas, and fresh parsley.'],
     sci:'The Mediterranean dietary pattern reduces cardiovascular disease risk by 33% and cognitive decline by 23% (Sofi et al., BMJ, 2008; Morris et al., Alzheimer\'s & Dementia, 2015). Quinoa is one of fewer than 10 plant foods containing all 9 essential amino acids. Olive oil oleocanthal inhibits COX-1 and COX-2 enzymes with similar activity to ibuprofen. Hydroxytyrosol in olives is one of the most potent natural antioxidants ever measured.',
     ben:['Mediterranean diet: 33% lower cardiovascular disease risk','Quinoa: one of few plants with all 9 essential amino acids','Olive oil oleocanthal: natural COX inhibitor (ibuprofen mechanism)','Chickpeas: prebiotic galactooligosaccharides feed gut bacteria'],
     shop:'Quinoa: Ancient Harvest or Kirkland (Costco ~$12/5lb) | Chickpeas: Goya canned (Walmart, all stores ~$1/can) | Feta: Greek feta in brine at Costco (~$8/block — best quality) | Kalamata olives: Trader Joe\'s ($4) | EVOO: California Olive Ranch ($10, Costco)'},
    {id:'l1',e:'🍲',n:'Red Lentil Soup with Lemon & Cumin',t:'35 min',s:4,cost:'$1.80',cal:320,pro:'20g',fib:'16g',dif:'Easy',col:'#FFF8E7',
     tags:['folate','iron','lowers LDL'],
     ing:['2 cups red lentils (rinsed)','6 cups low-sodium vegetable broth','1 large onion (diced)','4 garlic cloves (minced)','2 tsp ground cumin','1 tsp ground turmeric','½ tsp smoked paprika','1 can (14oz) diced tomatoes','2 tbsp extra virgin olive oil','1 lemon (juice)','Fresh cilantro or flat-leaf parsley','Salt & black pepper'],
     steps:['Sauté diced onion in olive oil over medium heat for 5 minutes until softened and translucent.','Add garlic, cumin, turmeric, and paprika. Cook 1 minute, stirring constantly, until fragrant.','Add rinsed lentils, diced tomatoes, and broth. Bring to a boil.','Reduce heat and simmer 20–25 minutes until lentils are completely soft.','Use an immersion blender to blend half the soup for creamy texture. Stir in lemon juice. Adjust seasoning. Top with cilantro.'],
     sci:'Red lentils reduce LDL cholesterol by an average of 0.14 mmol/L per serving (American Journal of Clinical Nutrition meta-analysis, 2014). One cup provides 90% DV folate — critical for homocysteine metabolism. Elevated homocysteine doubles Alzheimer\'s disease risk. Every 5 µmol/L reduction in homocysteine is associated with 19% lower stroke risk. Cost per serving ~$1.80 makes this the most budget-friendly powerhouse in this plan.',
     ben:['90% daily folate — prevents elevated homocysteine','Lentils reduce LDL by 0.14 mmol/L (clinical evidence)','19% lower stroke risk per 5 µmol/L homocysteine reduction','$1.80/serving — most economical brain-heart food on earth'],
     shop:'Red lentils: Goya ($2/lb at all stores) or bulk from Indian grocery ($1.20/lb) | Vegetable broth: Pacific Foods Low Sodium (Costco $12/12 cartons) | Smoked paprika: La Chinata (World Market ~$4) | Budget tip: entire 4-serving pot costs $7.20'},
    {id:'l2',e:'🥗',n:'Chickpea & Avocado Power Salad',t:'15 min',s:2,cost:'$3.80',cal:490,pro:'16g',fib:'13g',dif:'Easy',col:'#E0F5EE',
     tags:['lutein','nitrates','quercetin'],
     ing:['1 can chickpeas (drained, rinsed)','2 ripe Hass avocados (cubed)','2 cups baby arugula','½ cup oil-packed sun-dried tomatoes (drained)','¼ cup thinly sliced red onion','2 tbsp capers (drained)','3 tbsp extra virgin olive oil','2 tbsp apple cider vinegar','1 tsp Dijon mustard','1 garlic clove (minced)','Fresh basil','Salt & black pepper'],
     steps:['Make dressing: whisk together olive oil, apple cider vinegar, Dijon mustard, minced garlic, salt, and pepper.','Toss chickpeas, arugula, sun-dried tomatoes, red onion, and capers with the dressing.','Gently fold in cubed avocado to avoid mashing.','Top with torn fresh basil leaves and extra cracked black pepper. Serve immediately.'],
     sci:'Avocado lutein and zeaxanthin are selectively taken up by the brain (particularly the frontal cortex) and are inversely associated with cognitive decline. A 2017 Nutrients study found daily avocado consumption improved cognitive flexibility in overweight adults. Arugula contains more dietary nitrates than beet root per gram — these convert to nitric oxide, improving cerebral blood flow. Capers have the highest quercetin content of any food (234mg/100g).',
     ben:['Avocado lutein selectively accumulates in brain frontal cortex','Arugula: more nitrates than beet root per gram → cerebral blood flow','Capers: highest quercetin content of any food (234mg/100g)','Apple cider vinegar improves insulin sensitivity'],
     shop:'Avocados: Costco 6-pack (~$6) — ripen at room temp, refrigerate when ready | Capers: Goya capers (Publix ~$3) | Sun-dried tomatoes: Trader Joe\'s ($4) | Apple cider vinegar: Bragg\'s with the Mother (all stores ~$4)'},
    {id:'l3',e:'🍱',n:'Miso Soup with Tofu, Wakame & Shiitake',t:'20 min',s:2,cost:'$2.40',cal:180,pro:'14g',fib:'4g',dif:'Easy',col:'#EEEDFE',
     tags:['probiotics','iodine','vitamin D'],
     ing:['4 cups kombu dashi or vegetable broth','3 tbsp white (shiro) miso paste','200g silken tofu (cubed)','2 tbsp dried wakame seaweed','1 cup fresh shiitake mushrooms (sliced)','3 green onions (sliced)','1 tbsp low-sodium soy sauce','1 tsp toasted sesame oil','1 tsp fresh ginger (grated)'],
     steps:['Rehydrate dried wakame in cold water for 5 minutes. Drain and set aside.','Bring broth to a gentle simmer. Add sliced shiitake and grated ginger. Cook 5 minutes.','Remove ½ cup of hot broth into a bowl. Whisk in miso paste until completely dissolved.','Return miso mixture to the pot — NEVER bring to a full boil (destroys beneficial enzymes and probiotics).','Add silken tofu cubes, wakame, and soy sauce. Serve topped with green onions and a drop of sesame oil.'],
     sci:'Miso is a traditionally fermented food containing Aspergillus oryzae, Lactobacillus, and other microorganisms that support gut-brain axis health. Wakame seaweed provides iodine (essential for thyroid hormones that regulate brain metabolism) and fucoidan — a prebiotic fiber with documented neuroprotective effects in animal models. Shiitake mushrooms contain lentinan (an immunomodulating beta-glucan) and are among the few plant sources of vitamin D2.',
     ben:['Miso fermented cultures support gut-brain axis serotonin pathway','Wakame iodine: essential for thyroid-mediated brain metabolism','Shiitake lentinan: immunomodulating beta-glucan','Never boil miso — heat above 115°F destroys live cultures'],
     shop:'White miso: Marukome Organic or Hikari (Asian grocery $5–7/tub — lasts 3 months refrigerated) | Dried wakame: Asian markets (Hmart, Pacific Asian) ~$4/bag | Silken tofu: Nasoya or Mori-Nu ($3) | Shiitake: Fresh at Asian markets or dried at any grocery'},
    {id:'l4',e:'🫓',n:'Falafel Wrap with Tahini & Tabbouleh',t:'35 min',s:2,cost:'$4.00',cal:520,pro:'20g',fib:'13g',dif:'Medium',col:'#FAECE7',
     tags:['sesamin','low glycemic','calcium'],
     ing:['1 can chickpeas (drained, very dry)','¼ cup fresh flat-leaf parsley','¼ cup fresh cilantro','1 small yellow onion','3 garlic cloves','1 tsp cumin','1 tsp coriander','2 tbsp all-purpose or chickpea flour','Salt to taste','2 tbsp olive oil (for cooking)','2 large whole wheat wraps','3 tbsp tahini + water + lemon (for sauce)','1 cup store-bought or homemade tabbouleh','Sliced cucumber and tomato'],
     steps:['Pulse chickpeas, herbs, onion, garlic, spices in a food processor until coarse (NOT smooth paste).','Add flour and salt. Mix. Form into 8–10 small disc-shaped patties. Refrigerate 30 minutes to firm up.','Make tahini sauce: whisk tahini with lemon juice, garlic, and enough water for a drizzleable consistency.','Cook falafel in olive oil over medium heat, 3 minutes per side, until deeply golden brown.','Warm wraps. Layer falafel, tabbouleh, cucumber, tomato, and tahini sauce. Roll tightly and serve.'],
     sci:'Sesame tahini contains sesamin and sesamolin — lignans that inhibit delta-5-desaturase, favorably reducing the omega-6:omega-3 ratio in cell membranes. Homemade falafel has a glycemic index of approximately 32 (very low), providing stable blood glucose — critical for avoiding the postprandial blood sugar crashes that impair cognitive function. Chickpea saponins bind bile acids in the gut, reducing cholesterol reabsorption by 10–15%.',
     ben:['Tahini sesamin/sesamolin optimizes omega-6:omega-3 ratio','Homemade falafel GI ≈ 32 (very low) — no blood sugar crashes','Chickpea saponins reduce cholesterol reabsorption by 10–15%','Tahini: 130mg calcium per 2 tbsp + copper and manganese'],
     shop:'Chickpeas: Goya ($1/can) | Tahini: Soom Foods (Whole Foods ~$8, best quality) or Trader Joe\'s Organic ($5) | Whole wheat wraps: Mission or La Tortilla Factory ($4) | Fresh herbs: Publix produce ($2 each) | Tabbouleh: Near East mix or Whole Foods prepared'},
    {id:'l5',e:'🥣',n:'Tempeh Buddha Bowl with Ginger Miso Dressing',t:'30 min',s:2,cost:'$4.80',cal:550,pro:'32g',fib:'12g',dif:'Medium',col:'#EAF3DE',
     tags:['fermented protein','isoflavones','GABA'],
     ing:['240g organic tempeh (cubed)','2 cups cooked brown rice','1 cup shelled edamame (thawed)','1 cup shredded purple cabbage','1 large carrot (julienned)','1 ripe avocado (sliced)','Marinade: 2 tbsp soy sauce, 1 tbsp sesame oil, 1 tbsp maple syrup','Dressing: 2 tbsp white miso, 1 tbsp tahini, 1 tsp fresh ginger, 1 lemon (juice), 2 tbsp warm water'],
     steps:['Cube tempeh. Combine soy sauce, sesame oil, and maple syrup. Marinate tempeh 15 minutes.','Bake marinated tempeh at 400°F for 20 minutes (flip halfway), OR pan-fry 3–4 min per side until caramelized.','Whisk all dressing ingredients together, adding warm water to thin to drizzleable consistency.','Arrange brown rice, edamame, purple cabbage, carrot, and sliced avocado in two bowls.','Top with tempeh and generous drizzle of ginger miso dressing. Serve immediately.'],
     sci:'Tempeh fermentation by Rhizopus oligosporus reduces phytic acid content by 40%, dramatically improving bioavailability of zinc, iron, and manganese. Purple cabbage contains 90mg anthocyanins per cup — comparable to blueberries. Soy isoflavones exhibit cardioprotective effects through estrogenic receptor modulation (JAMA Internal Medicine meta-analysis, 2003). Brown rice contains naturally occurring GABA — the primary inhibitory neurotransmitter, promoting calm focus.',
     ben:['Fermentation reduces phytic acid 40% — doubles mineral absorption','Purple cabbage: 90mg anthocyanins per cup (≈ blueberries)','Soy isoflavones: cardioprotective via estrogenic modulation (meta-analysis)','Brown rice GABA supports calm, focused mental state'],
     shop:'Tempeh: Lightlife Organic (Whole Foods, Publix ~$3–4) | Edamame: Costco frozen shelled ($8/4lb bag) | Purple cabbage: All stores (~$2) | Brown rice: Lundberg Organic ($6) | Miso for dressing: same tub used for soup'},
    {id:'l6',e:'🫐',n:'Roasted Beet & Arugula Salad with Goat Cheese',t:'55 min',s:2,cost:'$4.40',cal:420,pro:'12g',fib:'8g',dif:'Medium',col:'#FBEAF0',
     tags:['dietary nitrates','blood pressure','Nrf2 activation'],
     ing:['4 medium beets (roasted)','4 cups baby arugula','¼ cup walnuts (toasted)','60g fresh goat cheese (crumbled)','¼ cup pomegranate arils','Dressing: 3 tbsp balsamic vinegar, 3 tbsp EVOO, 1 tsp honey, 1 tsp Dijon mustard','Salt, pepper, fresh thyme'],
     steps:['Preheat oven to 400°F. Wrap individual beets in foil with a drizzle of olive oil. Roast 45 minutes.','Let cool, then peel (skins slide off easily over the sink). Slice into quarters or wedges.','Toast walnuts in a dry pan over medium heat, 3–4 minutes until fragrant. Watch closely — they burn fast.','Whisk dressing ingredients together. Taste and adjust.','Arrange arugula on plates. Top with beets, crumble goat cheese, scatter walnuts and pomegranate arils. Drizzle dressing.'],
     sci:'Beets are the richest dietary source of inorganic nitrates, which are reduced by oral bacteria to nitrite and then to nitric oxide — a powerful vasodilator. A landmark 2010 Hypertension study showed that 500mL beet juice (equivalent nitrate to 2 medium beets) reduced systolic blood pressure by 4–10 mmHg. Pomegranate punicalagin reduced carotid intima-media thickness by 30% over 3 years in a randomized trial (Aviram et al., Clinical Nutrition, 2004). Arugula isothiocyanates activate Nrf2 — the master antioxidant regulatory gene.',
     ben:['Beet nitrates reduce systolic BP by 4–10 mmHg (clinical trial)','Pomegranate reduced arterial plaque 30% over 3 years (RCT)','Arugula isothiocyanates activate Nrf2 antioxidant master gene','Walnuts: 2.5g ALA omega-3 + polyphenols that reduce ox-LDL'],
     shop:'Beets: Costco multipack ($6) or Love Beets pre-cooked pouches (any grocery ~$5, saves 45 min) | Goat cheese: Laura Chenel original (Whole Foods) or Trader Joe\'s ($4–5) | Pomegranate arils: Costco POM pomegranate seeds ($7/large cup) | Balsamic: Trader Joe\'s Aged Balsamic ($5)'},
  ],
  d:[
    {id:'d0',e:'🍛',n:'Saag Dal — Lentils with Spinach & Spices',t:'40 min',s:4,cost:'$2.20',cal:380,pro:'22g',fib:'18g',dif:'Medium',col:'#EAF4EE',
     tags:['folate','butyrate','22% lower heart risk'],
     ing:['1½ cups yellow split peas or red lentils','4 cups low-sodium vegetable broth','4 cups fresh baby spinach','1 can (14oz) diced tomatoes','1 large onion (finely diced)','4 garlic cloves (minced)','1 tbsp fresh ginger (grated)','2 tsp cumin seeds','1 tsp coriander','1 tsp turmeric','½ tsp garam masala','2 tbsp ghee or coconut oil','Salt to taste','Brown rice to serve'],
     steps:['Cook lentils in broth with turmeric until completely soft, about 20 minutes. Stir occasionally.','In a separate pan (the tarka): heat ghee over medium-high. Add cumin seeds and let them pop (30 seconds).','Add diced onion. Cook 10–12 minutes until deeply golden-brown — this caramelization is essential for flavor.','Add garlic, ginger, coriander. Cook 1 minute. Add tomatoes and cook 5 minutes until thickened.','Pour tomato mixture into lentils. Add spinach. Simmer 5 minutes together. Season with garam masala and salt.'],
     sci:'A 2016 Circulation study found that legume consumption of ≥4 servings per week was associated with 22% lower risk of coronary heart disease. Folate and B6 from lentils synergistically reduce homocysteine levels — every 5 µmol/L decrease corresponds to 19% lower stroke risk. Ghee (clarified butter) contains butyrate, a short-chain fatty acid that directly nourishes colonocytes (gut lining cells) and has documented anti-inflammatory effects in the gut. The cumin-turmeric-coriander combination acts through complementary anti-inflammatory pathways.',
     ben:['≥4 legume servings/week → 22% lower heart disease risk','Folate + B6 reduce homocysteine → 19% lower stroke risk','Ghee butyrate nourishes the gut lining and reduces inflammation','18g fiber — the single highest-fiber dish in this entire plan'],
     shop:'Yellow split peas or red lentils: Goya ($2/lb) or Indian grocery bulk bins ($1.20/lb) | Ghee: 4th & Heart (Whole Foods $8) or Purity Farms ($10) | Whole spices: Indian grocery store — cumin, coriander 70% cheaper than McCormick | Budget: entire pot ($8.80) = $2.20/serving'},
    {id:'d1',e:'🍄',n:'Wild Mushroom Risotto with Parmesan & Thyme',t:'50 min',s:4,cost:'$5.20',cal:480,pro:'18g',fib:'3g',dif:'Hard',col:'#FFF8E7',
     tags:['ergothioneine','vitamin D','cognitive protection'],
     ing:['1½ cups Arborio rice','1 oz dried porcini mushrooms','2 cups mixed fresh mushrooms (cremini, shiitake, oyster)','4 cups warm vegetable broth (kept warm in a separate pot)','1 cup dry white wine','1 large onion (finely diced)','4 garlic cloves (minced)','60g Parmigiano-Reggiano (grated)','3 tbsp unsalted butter','2 tbsp extra virgin olive oil','Fresh thyme','Fresh flat-leaf parsley','Salt & freshly cracked black pepper'],
     steps:['Rehydrate porcini in 1 cup very hot water for 20 minutes. Strain carefully (save liquid!). Chop mushrooms.','Sauté fresh mushrooms in 1 tbsp butter over high heat until deeply golden, about 6 minutes. Set aside.','In the same wide pan, sauté onion in oil 5 minutes. Add garlic, cook 1 minute. Add Arborio rice; stir to coat.','Add wine; stir until fully absorbed. Begin adding warm broth one ladle at a time, stirring constantly, waiting for each ladle to be absorbed before adding the next. Add strained porcini liquid (filtered through cheesecloth or coffee filter).','After 20–22 minutes total, rice should be al dente. Remove from heat. Stir in remaining butter and Parmesan (the "mantecatura"). Fold in sautéed mushrooms. Rest 2 minutes. Garnish with thyme and parsley.'],
     sci:'Mushrooms are essentially the only food containing ergothioneine — a unique antioxidant and cytoprotective amino acid that accumulates specifically in mitochondria, protecting against oxidative DNA damage. People who eat mushrooms twice weekly have a significantly lower rate of mild cognitive impairment (Feng et al., Journal of Alzheimer\'s Disease, 2019, n=663). Dried porcini mushrooms exposed to sunlight contain up to 25 µg vitamin D2 per 100g. Aged Parmesan (minimum 24 months) contains no lactose and high concentrations of CLA (conjugated linoleic acid).',
     ben:['Ergothioneine accumulates in brain mitochondria — unique protection','Regular mushroom consumption: significantly lower MCI rate (RCT evidence)','Dried porcini: up to 25µg vitamin D2 per 100g','Mantecatura technique emulsifies fat for optimal satiety'],
     shop:'Arborio rice: RiceSelect (Publix, Target ~$5) | Dried porcini: Trader Joe\'s ($5) or Whole Foods bulk | Fresh mushroom mix: Costco 2lb pack ($7) | Parmesan: Parmigiano-Reggiano DOP block at Costco ($12/lb — only buy the authentic DOP designation for health benefits) | White wine for cooking: Trader Joe\'s two-buck-chuck ($3)'},
    {id:'d2',e:'🧡',n:'Chickpea Tikka Masala',t:'35 min',s:4,cost:'$2.80',cal:420,pro:'18g',fib:'14g',dif:'Easy',col:'#FAECE7',
     tags:['lycopene','lauric acid','prebiotic'],
     ing:['2 cans (15oz) chickpeas (drained, rinsed)','1 can (13.5oz) full-fat coconut milk','1 can (14oz) crushed San Marzano tomatoes','1 large yellow onion (finely diced)','5 garlic cloves (minced)','2 tbsp fresh ginger (grated)','3 tbsp tikka masala paste (Patak\'s)','1 tsp garam masala','1 tsp ground cumin','2 tbsp extra virgin olive oil','Fresh cilantro','Brown basmati rice and/or whole wheat naan to serve'],
     steps:['Heat olive oil in a large heavy-bottomed pot. Add diced onion and cook over medium heat for 15 minutes, stirring occasionally, until deeply caramelized and sweet. Do not rush this step — it builds the entire flavor foundation.','Add garlic, ginger, tikka masala paste, and cumin. Stir and cook 3 minutes until very fragrant.','Add crushed tomatoes. Cook 8 minutes, stirring frequently, until the sauce darkens and the oil begins to separate around the edges.','Pour in coconut milk. Stir to combine. Add chickpeas. Simmer 10 minutes.','Add garam masala. Adjust salt. Top generously with fresh cilantro. Serve over brown basmati rice.'],

  ).join('');
  const rows = week.map((day,di)=>{
    const b=MEALS.b[day.b],l=MEALS.l[day.l],d=MEALS.d[day.d];
    return `<div class="day-row">
      <div class="day-label">
        <div class="day-chip">${DAYS_S[di]}</div>
        <div class="day-name">${DAYS[di]}</div>
      </div>
      <div class="day-grid">
        ${mealCell('BREAKFAST',b)}${mealCell('LUNCH',l)}${mealCell('DINNER',d)}
      </div>
    </div>`;
  }).join('');
  return `
    <div class="hdr hdr-navy">
      <div class="hdr-title">30-Day Meal Calendar</div>
      <div class="hdr-sub">Tap any meal to see its full recipe</div>
    </div>
    <div class="content">
      <div class="week-tabs">${weekBtns}</div>
      ${rows}
    </div>`;
}

function mealCell(type, m){
  return `<div class="meal-cell" style="background:${m.col}" onclick="openMeal('${m.id}')">
    <div class="cell-emoji">${m.e}</div>
    <div class="cell-type">${type}</div>
    <div class="cell-name">${m.n.length>32?m.n.substring(0,32)+'…':m.n}</div>
    <div class="cell-cost">${m.cost}</div>
  </div>`;
}

function renderRecipes(){
  const filters=['All','Breakfast','Lunch','Dinner','Easy','Medium','Hard'];
  const pills=filters.map(f=>`<button class="filter-pill${state.filterCat===f?' active':''}" onclick="setFilter('${f}')">${f}</button>`).join('');
  let items=allMeals();
  if(state.filterCat==='Breakfast') items=MEALS.b;
  else if(state.filterCat==='Lunch') items=MEALS.l;
  else if(state.filterCat==='Dinner') items=MEALS.d;
  else if(['Easy','Medium','Hard'].includes(state.filterCat)) items=items.filter(m=>m.dif===state.filterCat);
  if(state.search) items=items.filter(m=>m.n.toLowerCase().includes(state.search.toLowerCase())||m.tags.some(t=>t.toLowerCase().includes(state.search.toLowerCase())));
  const cards=items.map(m=>`
    <div class="card" onclick="openMeal('${m.id}')">
      <div class="card-row">
        <div class="big-emoji">${m.e}</div>
        <div class="card-info">
          <div class="card-name">${m.n}</div>
          <div class="card-meta">
            <span>⏱ ${m.t}</span>
            <span>👥 ${m.s}</span>
            <span class="card-cost">💰 ${m.cost}</span>
          </div>
          <div class="card-nutrients"><span>${m.cal} cal</span><span>·</span><span>${m.pro} protein</span><span>·</span><span>${m.fib} fiber</span></div>
          <div class="tags">${tagBadges(m.tags)}</div>
        </div>
        <div class="chevron">›</div>
      </div>
    </div>`).join('');
  return `
    <div class="hdr hdr-teal">
      <div class="hdr-title">All 21 Recipes</div>
      <div style="position:relative;margin-top:12px">
        <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px">🔍</span>
        <input class="search-input" type="text" placeholder="Search recipes or nutrients…" value="${state.search}" oninput="setSearch(this.value)">
      </div>
    </div>
    <div class="content">
      <div class="filter-bar">${pills}</div>
      <div class="results-count">${items.length} recipe${items.length!==1?'s':''}</div>
      ${cards}
    </div>`;
}

function renderShop(){
  const views=['stores','costs','tips'];
  const tabs=views.map(v=>`<button class="sub-tab${state.shopView===v?' active':''}" onclick="setShopView('${v}')">${v.charAt(0).toUpperCase()+v.slice(1)}</button>`).join('');
  let body='';
  if(state.shopView==='stores'){
    body=`<p style="font-size:13px;color:#555;line-height:1.7;margin-bottom:16px">Strategic multi-store shopping cuts your grocery bill by 40–60% while maintaining the highest ingredient quality. Here's where to get every major category.</p>`
    +STORES.map(s=>`<div class="store-card">
      <div class="store-row">
        <div class="store-icon">${s.icon}</div>
        <div><div class="store-name">${s.name}</div><div class="store-type">${s.type}</div></div>
        <div class="store-savings">${s.savings}</div>
      </div>
      <div class="store-items">${s.items}</div>
    </div>`).join('');
  } else if(state.shopView==='costs'){
    body=`<div class="savings-hero">
      <div class="savings-val">$9.40</div>
      <div class="savings-lbl">per day · all three meals</div>
      <div class="savings-sub">vs. $15–25/day US average · saves $2,000–5,000/year</div>
    </div>
    <div class="cost-table">
      <div class="cost-hdr"><span>Category</span><span>Daily</span><span>Weekly</span><span>Monthly</span></div>
      ${COSTS.map(r=>`<div class="cost-row${r[4]?' total':''}"><span>${r[0]}</span><span>${r[1]}</span><span>${r[2]}</span><span>${r[3]}</span></div>`).join('')}
    </div>
    <div class="shop-box">
      <div class="shop-label">💡 TRUE COST COMPARISON</div>
      <div class="shop-text">The cost of <em>not</em> eating well — including medical bills, lost productivity, and premature cognitive decline — is estimated at $3,000–10,000 per person per year. This plan saves money on both groceries AND long-term healthcare costs. The best return on investment in nutrition science.</div>
    </div>`;
  } else {
    body=TIPS.map((tip,i)=>`<div class="tip-item">
      <div class="tip-num">${i+1}</div>
      <div><div class="tip-title">${tip.t}</div><div class="tip-detail">${tip.d}</div></div>
    </div>`).join('');
  }
  return `
    <div class="hdr hdr-rust">
      <div class="hdr-title">Shopping Guide</div>
      <div style="margin-top:12px"><div class="sub-tabs">${tabs}</div></div>
    </div>
    <div class="content">${body}</div>`;
}

function renderScience(){
  const views=['facts','pillars','supplements'];
  const tabs=views.map(v=>`<button class="sub-tab${state.sciView===v?' active':''}" onclick="setSciView('${v}')">${v.charAt(0).toUpperCase()+v.slice(1)}</button>`).join('');
  let body='';
  if(state.sciView==='facts'){
    body=`<p style="font-size:13px;color:#555;line-height:1.7;margin-bottom:16px">Every food recommendation in this plan is grounded in peer-reviewed research. These are the landmark findings that form the scientific foundation.</p>`
    +SCIENCE.map(s=>`<div class="science-card">
      <div class="sci-row">
        <div class="sci-icon">${s.icon}</div>
        <div>
          <div class="sci-title">${s.title}</div>
          <div class="sci-stat">${s.stat}</div>
          <div class="sci-desc">${s.desc}</div>
          <div class="sci-source">Source: ${s.src}</div>
        </div>
      </div>
    </div>`).join('');
  } else if(state.sciView==='pillars'){
    body=`<p style="font-size:13px;color:#555;line-height:1.7;margin-bottom:16px">Every meal in this plan is engineered around 7 scientifically validated nutritional strategies. Together, they address every major mechanism of cardiovascular and neurological aging.</p>`
    +PILLARS.map(p=>`<div class="pillar-card">
      <div class="pillar-num" style="background:${p.c}">${p.n}</div>
      <div><div class="pillar-title" style="color:${p.c}">${p.title}</div><div class="pillar-desc">${p.desc}</div></div>
    </div>`).join('');
  } else {
    body=`<div class="warn-box">
      <div class="warn-title">⚠️ Essential for All Vegetarians & Vegans</div>
      <div class="warn-text">Even with this optimal whole-food diet, three nutrients are consistently insufficient from plant foods alone. These supplements are not optional extras — they are the evidence-based nutritional safety net that makes vegetarian eating fully safe and optimal long-term.</div>
    </div>`
    +SUPPLEMENTS.map(s=>`<div class="supp-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div class="supp-name">${s.name}</div>
        <div class="supp-cost">${s.cost}</div>
      </div>
      <div class="supp-dose">💊 ${s.dose}</div>
      <div class="supp-why">${s.why}</div>
      <div class="supp-brands">Recommended brands: ${s.brands}</div>
    </div>`).join('');
  }
  return `
    <div class="hdr hdr-navy">
      <div class="hdr-title">The Science</div>
      <div class="hdr-sub">Evidence-based nutrition for brain & heart</div>
      <div style="margin-top:12px"><div class="sub-tabs">${tabs}</div></div>
    </div>
    <div class="content">${body}</div>`;
}

function renderDetail(m){
  const stabs=['recipe','science','shop'];
  const tabs=stabs.map(t=>`<button class="detail-tab${state.detailSubTab===t?' active':''}" onclick="setDetailTab('${t}')">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('');
  let body='';
  if(state.detailSubTab==='recipe'){
    const ings=m.ing.map(i=>`<div class="ingredient-item"><div class="ing-dot"></div><span>${i}</span></div>`).join('');
    const steps=m.steps.map((s,i)=>`<div class="step-item"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></div>`).join('');
    const bens=m.ben.map(b=>`<div class="benefit-item"><span class="check">✓</span><span>${b}</span></div>`).join('');
    body=`
      <div class="section-title">Ingredients</div>${ings}
      <div class="section-title">Method</div>${steps}
      <div class="section-title">Health Benefits</div>${bens}`;
  } else if(state.detailSubTab==='science'){
    body=`
      <div class="science-box">
        <div class="science-label">🔬 Peer-Reviewed Research</div>
        <div class="science-text">${m.sci}</div>
      </div>
      <div class="section-title">Bioactive Compounds</div>
      <div class="tags" style="gap:6px">${m.tags.map(t=>`<span class="tag" style="background:${tagColor(t)};color:#333;font-size:12px;padding:5px 12px">${t}</span>`).join('')}</div>
      <div class="tip-box" style="margin-top:14px">
        <div class="tip-label">📊 Nutritional Profile</div>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px">
          ${[['Calories',m.cal+' kcal'],['Protein',m.pro],['Fiber',m.fib],['Cost per serving',m.cost],['Difficulty',m.dif],['Servings',m.s]].map(([k,v])=>`<div style="background:var(--light-bg);border-radius:8px;padding:10px"><div style="font-size:15px;font-weight:800;color:var(--emerald)">${v}</div><div style="font-size:11px;color:var(--text-3)">${k}</div></div>`).join('')}
        </div>
      </div>`;
  } else {
    body=`
      <div class="shop-box">
        <div class="shop-label">🛒 Where to Buy & Estimated Costs</div>
        <div class="shop-text">${m.shop}</div>
      </div>
      <div class="tip-box">
        <div class="tip-label">💡 Pro Shopping Tips</div>
        <div class="tip-text">
          • Buy pantry staples (lentils, grains, spices) in bulk — saves 40–60%<br>
          • Indian grocery stores sell spices 70–80% cheaper than McCormick<br>
          • Frozen fruits and vegetables are often more nutritious than "fresh" (picked at peak, flash-frozen)<br>
          • Costco memberships pay for themselves in ~2 months with regular shopping<br>
          • Compare <em>unit prices</em> ($/oz or $/lb), never shelf prices
        </div>
      </div>`;
  }
  return `
    <div class="detail-header">
      <button class="back-btn" onclick="closeDetail()">‹ Back</button>
      <span style="font-size:13px;color:#aaa;font-weight:500">${
        m.id.startsWith('b')?'Breakfast':m.id.startsWith('l')?'Lunch':'Dinner'
      }</span>
    </div>
    <div class="detail-hero">
      <div class="detail-emoji">${m.e}</div>
      <div class="detail-name">${m.n}</div>
      <div class="detail-meta">
        <span>⏱ ${m.t}</span>
        <span>👥 ${m.s} servings</span>
        ${diffHtml(m.dif)}
      </div>
      <div class="tags" style="justify-content:center;margin-bottom:14px">${tagBadges(m.tags)}</div>
      <div class="metric-grid">
        ${[['Cal',m.cal],['Protein',m.pro],['Fiber',m.fib],['Cost',m.cost]].map(([k,v])=>`<div class="metric-card"><div class="metric-val">${v}</div><div class="metric-lbl">${k}</div></div>`).join('')}
      </div>
      <div class="detail-tabs">${tabs}</div>
    </div>
    <div style="padding:0 16px 24px">${body}</div>`;
}

/* ════════════════════════════════════════════
   RENDER DISPATCHER
════════════════════════════════════════════ */
function render(){
  const scr=document.getElementById('screen');
  const bar=document.getElementById('tabBar');
  if(state.detail){
    scr.innerHTML=renderDetail(state.detail);
    bar.style.display='none';
  } else {
    bar.style.display='flex';
    document.querySelectorAll('.tab-btn').forEach(b=>{
      b.classList.toggle('active', b.getAttribute('onclick').includes(`'${state.tab}'`));
    });
    if(state.tab==='home') scr.innerHTML=renderHome();
    else if(state.tab==='plan') scr.innerHTML=renderPlan();
    else if(state.tab==='recipes') scr.innerHTML=renderRecipes();
    else if(state.tab==='shop') scr.innerHTML=renderShop();
    else if(state.tab==='science') scr.innerHTML=renderScience();
  }
  scr.scrollTop=0;
}

/* ════════════════════════════════════════════
   ACTIONS
════════════════════════════════════════════ */
function nav(tab,el){
  state.tab=tab; state.detail=null;
  render();
}
function openMeal(id){
  const m=allMeals().find(x=>x.id===id);
  if(m){ state.detail=m; state.detailSubTab='recipe'; render(); }
}
function closeDetail(){ state.detail=null; render(); }
function setDetailTab(t){ state.detailSubTab=t; render(); }
function setWeek(w){ state.week=w; render(); }
function setFilter(f){ state.filterCat=f; render(); }
function setSearch(v){ state.search=v; render(); }
function setShopView(v){ state.shopView=v; render(); }
function setSciView(v){ state.sciView=v; render(); }

/* init */
render();
</script>
</body>
</html>
